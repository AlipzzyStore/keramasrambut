<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jadwal Keramas Wapik - Reward Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    
    <!-- Firebase SDK Compat Mode -->
    <script src="https://www.gstatic.com/firebasejs/11.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/11.6.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore-compat.js"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap');
        
        :root {
            --bg-color: #f8fafc;
            --card-bg: #ffffff;
            --text-main: #1e293b;
        }

        .dark {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --text-main: #f1f5f9;
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            transition: background-color 0.3s, color 0.3s;
        }

        .calendar-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 8px;
        }

        .calendar-day {
            aspect-ratio: 1 / 1;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 12px;
            font-size: 0.875rem;
            transition: all 0.2s;
            position: relative;
        }

        .is-keramas {
            background-color: #dbeafe;
            color: #1d4ed8;
            font-weight: 700;
            border: 2px solid #60a5fa;
        }

        .dark .is-keramas {
            background-color: #1e3a8a;
            color: #60a5fa;
            border-color: #3b82f6;
        }

        .is-done {
            background-color: #dcfce7 !important;
            border-color: #22c55e !important;
            color: #15803d !important;
        }

        .selected {
            outline: 3px solid #93c5fd;
            outline-offset: 2px;
        }

        .task-card {
            cursor: pointer;
            transition: all 0.2s;
            background-color: var(--card-bg);
        }

        .task-checked {
            background-color: #f0fdf4 !important;
            border-color: #22c55e !important;
        }
        
        .dark .task-checked {
            background-color: #064e3b !important;
            border-color: #10b981 !important;
        }

        .modal {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.5);
            align-items: center;
            justify-content: center;
            z-index: 1000;
            backdrop-filter: blur(4px);
        }

        .reward-img {
            max-height: 50vh;
            width: auto;
            border-radius: 20px;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1);
        }

        .loader {
            border: 3px solid #f3f3f3;
            border-radius: 50%;
            border-top: 3px solid #3498db;
            width: 20px;
            height: 20px;
            animation: spin 1s linear infinite;
            display: none;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="p-4 md:p-8">

    <!-- Modal Login Admin -->
    <div id="admin-login-modal" class="modal">
        <div class="bg-white dark:bg-slate-800 p-8 rounded-3xl shadow-2xl max-w-sm w-full mx-4">
            <h2 class="text-xl font-bold mb-4">Akses Admin</h2>
            <input type="password" id="admin-pass" placeholder="PIN Admin" class="w-full p-3 rounded-xl border dark:border-slate-600 dark:bg-slate-700 mb-4 focus:ring-2 focus:ring-blue-500 outline-none">
            <div class="flex gap-2">
                <button onclick="closeModal('admin-login-modal')" class="flex-1 py-2 text-slate-500 font-semibold">Batal</button>
                <button onclick="checkAdmin()" class="flex-1 py-2 bg-blue-600 text-white rounded-xl font-semibold">Masuk</button>
            </div>
        </div>
    </div>

    <!-- Modal Alert -->
    <div id="alert-modal" class="modal">
        <div class="bg-white dark:bg-slate-800 p-8 rounded-3xl shadow-2xl max-w-sm w-full text-center mx-4">
            <div id="alert-emoji" class="text-5xl mb-4">🤨</div>
            <p id="alert-text" class="text-lg font-bold leading-relaxed"></p>
            <button onclick="closeModal('alert-modal')" class="mt-6 px-8 py-3 bg-red-500 text-white rounded-full font-bold">Oke Maaf</button>
        </div>
    </div>

    <!-- Modal Reward -->
    <div id="reward-modal" class="modal">
        <div class="bg-white dark:bg-slate-800 p-6 rounded-3xl shadow-2xl max-w-md w-full mx-4 text-center">
            <h2 class="text-2xl font-bold mb-4 text-pink-500">Hadiah Buat Wapik! 💖</h2>
            <img id="reward-display" src="" class="reward-img mx-auto mb-4" alt="Reward Foto">
            <p id="reward-note" class="text-sm text-slate-500 mb-6 italic"></p>
            <div class="flex flex-col gap-3">
                <button id="download-btn" onclick="downloadImage()" class="w-full py-4 bg-gradient-to-r from-green-500 to-emerald-600 text-white rounded-2xl font-bold flex items-center justify-center gap-2">
                    <i class="fa-solid fa-cloud-arrow-down"></i> Simpan ke Galeri
                    <div id="dl-loader" class="loader"></div>
                </button>
                <button onclick="closeModal('reward-modal')" class="w-full py-2 text-slate-400 font-semibold text-sm">Tutup</button>
            </div>
        </div>
    </div>

    <div class="max-w-6xl mx-auto">
        <nav class="flex justify-between items-center mb-8">
            <button onclick="toggleDarkMode()" class="p-3 bg-white dark:bg-slate-800 rounded-2xl shadow-lg border border-slate-100 dark:border-slate-700">
                <i id="theme-icon" class="fa-solid fa-moon"></i>
            </button>
            <div class="flex gap-3">
                <button onclick="openAdmin()" class="px-4 py-2 bg-slate-200 dark:bg-slate-700 rounded-xl text-sm font-bold">Admin</button>
            </div>
        </nav>

        <div id="main-content">
            <header class="text-center mb-10">
                <h1 class="text-4xl font-extrabold text-blue-600 dark:text-blue-400 tracking-tight">Jadwal Keramas Wapik</h1>
                <p class="text-slate-500 dark:text-slate-400 mt-2 font-medium italic">"Reward cuma 1 foto setiap hari tugas keramas ya cil!"</p>
            </header>

            <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
                <!-- Kalender -->
                <section class="lg:col-span-2 bg-white dark:bg-slate-800 rounded-3xl shadow-xl p-6 border border-slate-100 dark:border-slate-700">
                    <div class="flex items-center justify-between mb-6">
                        <h2 class="text-xl font-bold flex items-center gap-2">
                            <i class="fa-solid fa-calendar-days text-blue-500"></i> Kalender
                        </h2>
                        <div class="flex gap-2">
                            <button onclick="changeMonth(-1)" class="p-2 hover:bg-slate-100 dark:hover:bg-slate-700 rounded-full"><i class="fa-solid fa-chevron-left"></i></button>
                            <button onclick="changeMonth(1)" class="p-2 hover:bg-slate-100 dark:hover:bg-slate-700 rounded-full"><i class="fa-solid fa-chevron-right"></i></button>
                        </div>
                    </div>
                    <div id="month-label" class="text-center font-bold mb-4 text-blue-700 dark:text-blue-400 uppercase tracking-wider"></div>
                    <div class="calendar-grid text-center mb-2">
                        <div class="text-xs font-bold text-slate-400">MIN</div>
                        <div class="text-xs font-bold text-slate-400">SEN</div>
                        <div class="text-xs font-bold text-slate-400">SEL</div>
                        <div class="text-xs font-bold text-slate-400">RAB</div>
                        <div class="text-xs font-bold text-slate-400">KAM</div>
                        <div class="text-xs font-bold text-slate-400">JUM</div>
                        <div class="text-xs font-bold text-slate-400">SAB</div>
                    </div>
                    <div id="calendar-days" class="calendar-grid"></div>
                </section>

                <!-- Tugas -->
                <section class="space-y-6">
                    <div class="bg-white dark:bg-slate-800 rounded-3xl shadow-xl p-6 border border-slate-100 dark:border-slate-700">
                        <h3 id="selected-date-label" class="text-xl font-bold mb-6"></h3>
                        <div id="task-area" class="space-y-4">
                            <div onclick="toggleTask('keramas')" id="task-keramas" class="task-card flex items-center justify-between p-4 rounded-2xl border-2 border-slate-100 dark:border-slate-700">
                                <div class="flex items-center gap-4">
                                    <div class="bg-blue-500 w-10 h-10 rounded-xl flex items-center justify-center text-white"><i class="fa-solid fa-soap"></i></div>
                                    <span class="font-bold">Sudah Keramas</span>
                                </div>
                                <div id="check-keramas" class="w-6 h-6 rounded-full border-2 border-slate-300 flex items-center justify-center text-white text-xs">
                                    <i class="fa-solid fa-check hidden"></i>
                                </div>
                            </div>
                            <div onclick="toggleTask('sisiran')" id="task-sisiran" class="task-card flex items-center justify-between p-4 rounded-2xl border-2 border-slate-100 dark:border-slate-700">
                                <div class="flex items-center gap-4">
                                    <div class="bg-pink-500 w-10 h-10 rounded-xl flex items-center justify-center text-white"><i class="fa-solid fa-scissors"></i></div>
                                    <span class="font-bold">Sudah Sisiran</span>
                                </div>
                                <div id="check-sisiran" class="w-6 h-6 rounded-full border-2 border-slate-300 flex items-center justify-center text-white text-xs">
                                    <i class="fa-solid fa-check hidden"></i>
                                </div>
                            </div>
                            <div class="mt-4">
                                <label class="relative flex flex-col items-center justify-center w-full h-32 border-2 border-dashed border-slate-200 dark:border-slate-600 rounded-3xl cursor-pointer overflow-hidden">
                                    <div id="photo-preview" class="absolute inset-0 hidden"></div>
                                    <div id="upload-placeholder" class="text-center">
                                        <i class="fa-solid fa-camera text-slate-400 mb-1"></i>
                                        <p class="text-xs font-bold text-slate-500">UPLOAD BUKTI</p>
                                    </div>
                                    <input type="file" id="photo-input" accept="image/*" class="hidden" onchange="handleImage(event)">
                                </label>
                            </div>
                            <button onclick="claimReward()" id="btn-reward" class="hidden w-full py-4 bg-gradient-to-r from-yellow-400 to-orange-500 text-white font-black rounded-2xl shadow-xl">
                                🎁 AMBIL REWARD FOTO!
                            </button>
                            <button onclick="sendWA()" class="w-full py-4 bg-green-500 text-white font-bold rounded-2xl flex items-center justify-center gap-2">
                                <i class="fa-brands fa-whatsapp"></i> Lapor ke WA
                            </button>
                        </div>
                        <div id="holiday-area" class="hidden py-12 text-center text-slate-400 italic">
                            Libur keramas, istirahat dulu yaa cil...
                        </div>
                    </div>
                </section>
            </div>
        </div>

        <!-- Dashboard Admin -->
        <div id="admin-view" class="hidden space-y-8">
            <div class="flex items-center justify-between">
                <h1 class="text-3xl font-black">Dashboard Admin</h1>
                <button onclick="closeAdmin()" class="px-6 py-2 bg-red-500 text-white rounded-xl font-bold">Keluar</button>
            </div>
            <div class="bg-white dark:bg-slate-800 p-6 rounded-3xl shadow-xl border border-slate-100 dark:border-slate-700">
                <h2 class="font-bold text-lg mb-4">Status Log Reward</h2>
                <div id="admin-status-list" class="space-y-3 max-h-96 overflow-y-auto"></div>
            </div>
        </div>
    </div>

    <script>
        // --- CONFIG MANUALLY ADDED ---
        const myFirebaseConfig = {
            apiKey: "AIzaSyCSsFQKckz2OXIitlyW_gylMQhBMXqTd0c",
            authDomain: "keramasrambut.firebaseapp.com",
            projectId: "keramasrambut",
            storageBucket: "keramasrambut.firebasestorage.app",
            messagingSenderId: "610427833983",
            appId: "1:610427833983:web:61009c6a0d53b49e42394a",
        };

        // Inisialisasi Firebase menggunakan config manual Anda
        firebase.initializeApp(myFirebaseConfig);
        const db = firebase.firestore();
        const auth = firebase.auth();
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'default-app-id';

        // Path mandatori
        const getCollectionRef = () => db.collection('artifacts').doc(appId).collection('public').doc('data').collection('logs');

        const START_DATE = new Date(2024, 4, 1);
        const ADMIN_PIN = "1945201011121314"; 
        let viewDate = new Date();
        let selectedDate = new Date();
        let tasks = { keramas: false, sisiran: false, photo: false };
        let userLogs = []; 
        let rewardPhotos = [
            "https://files.catbox.moe/85jalz.jpg",
            "https://files.catbox.moe/8e38tx.jpg",
            "https://files.catbox.moe/g30qa8.jpg",
            "https://files.catbox.moe/2qyvyg.jpg"
        ];
        let currentRewardUrl = "";

        // --- AUTH INIT ---
        async function initAuth() {
            try {
                // Gunakan token sistem jika ada, atau login anonim
                if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                    try {
                        await auth.signInWithCustomToken(__initial_auth_token);
                    } catch(e) {
                        // Fallback jika mismatch
                        await auth.signInAnonymously();
                    }
                } else {
                    await auth.signInAnonymously();
                }
            } catch (err) {
                console.error("Login Error:", err);
            }
        }

        auth.onAuthStateChanged(async (user) => {
            if (user) {
                await fetchLogs();
            }
        });

        // --- CORE LOGIC ---
        function isKeramasDay(date) {
            const d1 = new Date(START_DATE.getFullYear(), START_DATE.getMonth(), START_DATE.getDate());
            const d2 = new Date(date.getFullYear(), date.getMonth(), date.getDate());
            const diffDays = Math.round((d2 - d1) / (1000 * 60 * 60 * 24));
            return diffDays >= 0 && diffDays % 3 === 0;
        }

        async function fetchLogs() {
            if (!auth.currentUser) return;
            try {
                const snap = await getCollectionRef().get();
                userLogs = snap.docs.map(doc => doc.data().date);
                renderCalendar();
                updateUI();
            } catch (e) {
                console.error("Firestore Error:", e);
                renderCalendar();
                updateUI();
            }
        }

        function renderCalendar() {
            const container = document.getElementById('calendar-days');
            const label = document.getElementById('month-label');
            if(!container) return;
            
            container.innerHTML = '';
            label.innerText = new Intl.DateTimeFormat('id-ID', { month: 'long', year: 'numeric' }).format(viewDate);
            
            const firstDay = new Date(viewDate.getFullYear(), viewDate.getMonth(), 1).getDay();
            const daysInMonth = new Date(viewDate.getFullYear(), viewDate.getMonth() + 1, 0).getDate();

            for(let i=0; i<firstDay; i++) {
                container.appendChild(document.createElement('div'));
            }

            for(let d=1; d<=daysInMonth; d++) {
                const date = new Date(viewDate.getFullYear(), viewDate.getMonth(), d);
                const dateStr = date.toDateString();
                const btn = document.createElement('button');
                btn.innerText = d;
                
                let classes = "calendar-day hover:bg-slate-100 dark:hover:bg-slate-700 cursor-pointer ";
                if(isKeramasDay(date)) classes += "is-keramas ";
                if(userLogs.includes(dateStr)) classes += "is-done ";
                if(dateStr === selectedDate.toDateString()) classes += "selected ";
                
                btn.className = classes;
                btn.onclick = () => selectDate(date);
                container.appendChild(btn);
            }
        }

        function selectDate(date) {
            selectedDate = date;
            tasks = { keramas: false, sisiran: false, photo: false };
            const preview = document.getElementById('photo-preview');
            const placeholder = document.getElementById('upload-placeholder');
            if(preview) preview.classList.add('hidden');
            if(placeholder) placeholder.classList.remove('hidden');
            renderCalendar();
            updateUI();
        }

        function updateUI() {
            const dateStr = selectedDate.toDateString();
            const isWajib = isKeramasDay(selectedDate);
            const alreadyClaimed = userLogs.includes(dateStr);
            const label = document.getElementById('selected-date-label');
            
            if(label) label.innerText = new Intl.DateTimeFormat('id-ID', { day: 'numeric', month: 'long', year: 'numeric' }).format(selectedDate);
            
            const taskArea = document.getElementById('task-area');
            const holidayArea = document.getElementById('holiday-area');
            const rewardBtn = document.getElementById('btn-reward');

            if(isWajib) {
                taskArea.classList.remove('hidden');
                holidayArea.classList.add('hidden');
                
                if(alreadyClaimed) {
                    rewardBtn.innerText = "✅ REWARD DIAMBIL";
                    rewardBtn.classList.remove('hidden', 'animate-bounce');
                    rewardBtn.disabled = true;
                    rewardBtn.style.opacity = "0.6";
                } else {
                    rewardBtn.innerText = "🎁 AMBIL REWARD FOTO!";
                    rewardBtn.disabled = false;
                    rewardBtn.style.opacity = "1";
                    const allDone = tasks.keramas && tasks.sisiran && tasks.photo;
                    rewardBtn.classList.toggle('hidden', !allDone);
                    rewardBtn.classList.toggle('animate-bounce', allDone);
                }
            } else {
                taskArea.classList.add('hidden');
                holidayArea.classList.remove('hidden');
            }

            ['keramas', 'sisiran'].forEach(t => {
                const card = document.getElementById(`task-${t}`);
                const check = document.getElementById(`check-${t}`);
                if(!card || !check) return;

                if(tasks[t]) {
                    card.classList.add('task-checked');
                    check.classList.replace('border-slate-300', 'bg-green-500');
                    check.querySelector('i').classList.remove('hidden');
                } else {
                    card.classList.remove('task-checked');
                    check.classList.replace('bg-green-500', 'border-slate-300');
                    check.querySelector('i').classList.add('hidden');
                }
            });
        }

        function toggleTask(type) {
            if(userLogs.includes(selectedDate.toDateString())) return;
            tasks[type] = !tasks[type];
            updateUI();
        }

        function handleImage(e) {
            if(userLogs.includes(selectedDate.toDateString())) return;
            const file = e.target.files[0];
            if(file) {
                const reader = new FileReader();
                reader.onload = (ev) => {
                    const preview = document.getElementById('photo-preview');
                    preview.innerHTML = `<img src="${ev.target.result}" class="w-full h-full object-cover">`;
                    preview.classList.remove('hidden');
                    document.getElementById('upload-placeholder').classList.add('hidden');
                    tasks.photo = true;
                    updateUI();
                };
                reader.readAsDataURL(file);
            }
        }

        async function claimReward() {
            if (!auth.currentUser) return;
            const todayStr = new Date().toDateString();
            const selectedStr = selectedDate.toDateString();
            
            if(selectedStr !== todayStr) {
                showAlert("Gaboleh ambil reward buat tanggal lain! Harus jujur sesuai hari ini ya cil.", "🤨");
                return;
            }

            if(userLogs.includes(selectedStr)) {
                showAlert("Kamu kan udah ambil jatah foto hari ini. Cuma boleh 1 foto!", "😤");
                return;
            }

            const randomPhoto = rewardPhotos[Math.floor(Math.random() * rewardPhotos.length)];
            currentRewardUrl = randomPhoto;
            
            document.getElementById('reward-display').src = randomPhoto;
            document.getElementById('reward-note').innerText = "Selamat! Ini reward spesial buat Wapik yang rajin keramas.";
            document.getElementById('reward-modal').style.display = 'flex';
            
            try {
                await getCollectionRef().add({
                    date: selectedStr,
                    timestamp: firebase.firestore.FieldValue.serverTimestamp()
                });
                userLogs.push(selectedStr);
                renderCalendar();
                updateUI();
            } catch(e) { 
                console.error("Gagal simpan log:", e); 
            }
        }

        async function downloadImage() {
            const btn = document.getElementById('download-btn');
            const loader = document.getElementById('dl-loader');
            try {
                loader.style.display = "block";
                btn.disabled = true;
                const response = await fetch(currentRewardUrl);
                const blob = await response.blob();
                const blobUrl = window.URL.createObjectURL(blob);
                const link = document.createElement('a');
                link.href = blobUrl;
                link.download = `wapik-reward-${Date.now()}.jpg`;
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);
                window.URL.revokeObjectURL(blobUrl);
            } catch (e) {
                window.open(currentRewardUrl, '_blank');
            } finally {
                loader.style.display = "none";
                btn.disabled = false;
            }
        }

        function showAlert(msg, emoji = "🤨") {
            document.getElementById('alert-emoji').innerText = emoji;
            document.getElementById('alert-text').innerText = msg;
            document.getElementById('alert-modal').style.display = 'flex';
        }
        
        function closeModal(id) { document.getElementById(id).style.display = 'none'; }
        
        function toggleDarkMode() {
            document.documentElement.classList.toggle('dark');
            const isD = document.documentElement.classList.contains('dark');
            document.getElementById('theme-icon').className = isD ? 'fa-solid fa-sun' : 'fa-solid fa-moon';
        }
        
        function changeMonth(d) { 
            viewDate.setMonth(viewDate.getMonth() + d); 
            renderCalendar(); 
        }

        function openAdmin() { document.getElementById('admin-login-modal').style.display = 'flex'; }
        
        function checkAdmin() {
            if(document.getElementById('admin-pass').value === ADMIN_PIN) {
                closeModal('admin-login-modal');
                document.getElementById('main-content').classList.add('hidden');
                document.getElementById('admin-view').classList.remove('hidden');
                loadAdminLogs();
            } else { alert("PIN Salah!"); }
        }
        
        function closeAdmin() {
            document.getElementById('admin-view').classList.add('hidden');
            document.getElementById('main-content').classList.remove('hidden');
        }
        
        async function loadAdminLogs() {
            const list = document.getElementById('admin-status-list');
            list.innerHTML = 'Memuat...';
            try {
                const snap = await getCollectionRef().get();
                list.innerHTML = '';
                snap.docs.forEach(doc => {
                    const d = doc.data();
                    const div = document.createElement('div');
                    div.className = "p-3 bg-slate-50 dark:bg-slate-700 rounded-xl flex justify-between";
                    div.innerHTML = `<span>📅 ${d.date}</span> <span class="text-green-500 font-bold">REWARD DIAMBIL</span>`;
                    list.appendChild(div);
                });
            } catch (e) {
                list.innerHTML = 'Gagal memuat data.';
            }
        }

        function sendWA() {
            const dateStr = new Intl.DateTimeFormat('id-ID', { day: 'numeric', month: 'long', year: 'numeric' }).format(selectedDate);
            const msg = `Laporan *KERAMAS WAPIK*%0A📅 Tanggal: ${dateStr}%0A🚿 Status: ${tasks.keramas ? 'Sudah Keramas ✅' : 'Belum ❌'}`;
            window.open(`https://wa.me/6281399649577?text=${msg}`, '_blank');
        }

        window.onload = () => {
            initAuth();
            renderCalendar();
        };
    </script>
</body>
</html>
